services:
  - type: web
    name: fcgaa-stats-interface
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_TEXT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
